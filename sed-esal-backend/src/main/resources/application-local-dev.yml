spring:
  main:
    banner-mode: "off"
  datasource:
    url: jdbc:h2:mem:localdevdb;DB_CLOSE_DELAY=-1;NON_KEYWORDS=VALUE;INIT=CREATE SCHEMA IF NOT EXISTS SED_ESAL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
  h2:
    console:
      enabled: false

logging:
  level:
    co.gov.bogota.sed.esal: INFO
