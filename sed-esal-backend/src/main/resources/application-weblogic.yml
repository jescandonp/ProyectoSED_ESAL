spring:
  main:
    banner-mode: "off"
  datasource:
    url: ${SED_ESAL_DB_URL:jdbc:oracle:thin:@//PENDIENTE_CONFIRMAR_CON_DBA/SED_ESAL}
    driver-class-name: oracle.jdbc.OracleDriver
    username: ${SED_ESAL_DB_USER:SED_ESAL}
    password: ${SED_ESAL_DB_PASSWORD:PENDIENTE}
  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.Oracle12cDialect
    show-sql: false
  security:
    oauth2:
      resourceserver:
        jwt:
          # JWKS URI de Azure AD / Office 365
          # Pendiente confirmar tenant_id con TI SED
          jwk-set-uri: ${SED_ESAL_JWK_SET_URI:https://login.microsoftonline.com/TENANT_ID_PENDIENTE/discovery/v2.0/keys}

esal:
  security:
    jwt:
      # issuer-uri de Azure AD — incluye tenant_id
      issuer-uri: ${SED_ESAL_JWT_ISSUER_URI:https://login.microsoftonline.com/TENANT_ID_PENDIENTE/v2.0}
      # audience: client_id de la aplicacion registrada en Azure AD
      audience: ${SED_ESAL_JWT_AUDIENCE:CLIENT_ID_PENDIENTE}
      # Claim que contiene el rol del usuario (app roles de Azure AD)
      rol-claim: ${SED_ESAL_ROL_CLAIM:roles}
      # Valores de rol en el token Azure AD
      admin-claim-value: ${SED_ESAL_ADMIN_CLAIM:ADMINISTRADOR}
      expedidor-claim-value: ${SED_ESAL_EXPEDIDOR_CLAIM:EXPEDIDOR}
    # Origenes CORS permitidos en ambiente institucional
    # Pendiente confirmar dominio definitivo con TI SED
    cors-origins: ${SED_ESAL_CORS_ORIGINS:https://DOMINIO_INSTITUCIONAL_PENDIENTE}

logging:
  level:
    co.gov.bogota.sed.esal: INFO
    org.springframework.security: WARN
